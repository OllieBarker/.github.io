<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your designs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
		header {
            background-color: #ff6f61;
            color: #fff;
            text-align: center;
            padding: 20px 0;
        }
		nav a {
            margin: 0 15px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form label {
            display: block;
            margin-top: 10px;
        }
        form input, form textarea, form select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        form button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #ff6f61;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        form button:hover {
            background-color: #ff3b2d;
        }
        .note {
            font-size: 0.9em;
            color: #555;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<header>
        <h1>M & O - Swimsuit Designers</h1>
        <p>Your Ideas on a Swimsuit!</p>
		<nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="shop.html">Current Designs</a>
        <a href="contact.html">Contact</a>
		<a href="cart.html">Cart</a>
        </nav>
</header>
	
    <div class="container">
        <h1>Your designs</h1>
        <form action="mailto:your-email@example.com" method="POST" enctype="text/plain">
            <label for="name">Your Name *</label>
            <input type="text" id="name" name="Name" required>

            <label for="email">Email *</label>
            <input type="email" id="email" name="Email" required>

            <label for="color">Preferred Color *</label>
            <input type="text" id="color" name="Color" required>

            <label for="notes">Picture of Your Design</label>
            <textarea id="notes" name="Notes" rows="4" placeholder="Any extra details..."></textarea>

            <button type="submit">Submit Request</button>
            <p class="note">* All required fields must be filled out. Submission will open your email client. Please send to obarker13@outlook.com</p>
        </form>
    </div>
</body>
</html>
